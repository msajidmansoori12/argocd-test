apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-src
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/msajidmansoori12/argocd-test.git
    targetRevision: use-kustomize
    path: overlays/src

  destination:
    server: https://kubernetes.default.svc
    namespace: demo # this is the namespace in the cluster where the application will be deployed

  syncPolicy:
    automated:
      prune: true