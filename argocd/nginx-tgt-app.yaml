apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-tgt
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/msajidmansoori12/argocd-test.git
    targetRevision: use-kustomize
    path: overlays/tgt

  destination:
    name: kind-tgt
    namespace: demo

  syncPolicy:
    automated:
      prune: true